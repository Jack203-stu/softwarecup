<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字人形象管理</title>
<script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js"></script>
<script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/index.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f8fb;color:#2a4a6a;min-height:100vh}

.header{background:linear-gradient(135deg,#eaf2f8,#ffffff);padding:18px 25px;border-bottom:1px solid rgba(0,160,220,.2);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.header h1{font-size:1.6rem;background:linear-gradient(90deg,#0088cc,#006fa0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-btns{display:flex;gap:8px}
.nav-btn{color:#0088cc;text-decoration:none;font-size:.85rem;padding:7px 16px;border:1px solid #0088cc;border-radius:20px;transition:all .3s}
.nav-btn:hover{background:#0088cc;color:#fff}

.container{max-width:1400px;margin:0 auto;padding:20px}
.section-title{font-size:1.2rem;margin:20px 0 12px;color:#0088cc;display:flex;align-items:center;gap:8px}

.model-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;margin-bottom:25px}
.model-card{background:#ffffff;border:1px solid rgba(0,160,220,.2);border-radius:12px;overflow:hidden;transition:all .3s;position:relative}
.model-card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,140,200,.15);border-color:rgba(0,168,224,.4)}
.model-card.active{border-color:#00a86b;box-shadow:0 0 15px rgba(0,168,107,.2)}
.model-card.active::after{content:'当前使用';position:absolute;top:10px;right:10px;background:#00a86b;color:white;font-size:11px;padding:3px 10px;border-radius:10px}
.model-card.custom::after{content:'自定义';position:absolute;top:10px;right:10px;background:#e08a00;color:white;font-size:11px;padding:3px 10px;border-radius:10px}

.model-preview{height:220px;background:linear-gradient(135deg,#eaf2f8,#ffffff);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.model-preview canvas{max-width:100%;max-height:100%}
.model-preview .emoji-icon{font-size:64px}
.model-preview .loading{color:rgba(0,140,200,.55);font-size:14px}

.model-info{padding:15px}
.model-info h3{font-size:1.1rem;margin-bottom:5px;color:#0a2a4a}
.model-info p{font-size:.85rem;color:#5a7a9a;margin-bottom:8px}
.model-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.model-tag{font-size:.75rem;padding:3px 10px;background:rgba(0,168,224,.08);color:#006fa0;border-radius:10px}

.model-actions{display:flex;gap:8px;padding:0 15px 15px}
.btn{padding:7px 16px;border-radius:8px;font-size:.85rem;cursor:pointer;transition:all .2s;border:none}
.btn-primary{background:#00a8e0;color:white}
.btn-primary:hover{background:#0088cc}
.btn-danger{background:#e04848;color:white}
.btn-danger:hover{background:#c83838}
.btn-secondary{background:rgba(0,168,224,.08);color:#006fa0;border:1px solid rgba(0,160,220,.3)}
.btn-secondary:hover{background:rgba(0,168,224,.15)}
.btn-sm{padding:5px 12px;font-size:.8rem}

.upload-section{margin-top:30px;padding:25px;background:#ffffff;border:1px solid rgba(0,160,220,.2);border-radius:12px}
.upload-zone{border:2px dashed rgba(0,168,224,.35);border-radius:10px;padding:40px;text-align:center;cursor:pointer;transition:all .3s}
.upload-zone:hover,.upload-zone.dragover{border-color:#00a86b;background:rgba(0,168,107,.05)}
.upload-zone p{color:#5a7a9a;margin-top:10px;font-size:.9rem}
.upload-icon{font-size:40px;color:#00a8e0}
.upload-progress{color:#00a86b;margin-top:10px;font-size:.85rem}

.preview-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,20,35,.85);z-index:1000;display:none;align-items:center;justify-content:center}
.preview-overlay.show{display:flex}
.preview-box{background:#ffffff;border-radius:16px;padding:20px;max-width:500px;width:90%;position:relative;border:1px solid rgba(0,160,220,.3)}
.preview-close{position:absolute;top:10px;right:15px;color:#5a7a9a;font-size:24px;cursor:pointer;background:none;border:none}
.preview-close:hover{color:#00a8e0}
.preview-canvas{width:100%;height:400px;background:linear-gradient(135deg,#eaf2f8,#ffffff);border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.preview-canvas canvas{max-width:100%;max-height:100%}
.preview-info{text-align:center;margin-top:15px}
.preview-info h3{color:#0a2a4a;font-size:1.2rem}
.preview-info p{color:#5a7a9a;font-size:.9rem;margin-top:5px}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:rgba(0,40,70,.85);color:white;padding:10px 24px;border-radius:20px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
.toast.error{background:rgba(224,72,72,.9)}
.toast.success{background:rgba(0,168,107,.9)}

.voice-section{background:#ffffff;border:1px solid rgba(0,160,220,.2);border-radius:12px;padding:15px 20px;margin-bottom:20px;display:flex;align-items:center;gap:15px}
.voice-label{color:#0088cc;font-size:.9rem;font-weight:500}
.voice-select{background:rgba(220,238,248,.95);color:#0a2a4a;border:1px solid rgba(0,160,220,.35);border-radius:8px;padding:6px 12px;font-size:.9rem;cursor:pointer;outline:none;appearance:none;-webkit-appearance:none;min-width:150px}
.voice-select option{background:#ffffff;color:#0a2a4a}
.voice-select:focus{border-color:#00a8e0}
.voice-info{color:#5a7a9a;font-size:.8rem;margin-left:auto}
</style>
</head>
<body>

<div class="header">
  <h1>数字人形象管理</h1>
  <div class="nav-btns">
    <a href="/" class="nav-btn">返回主页</a>
  </div>
</div>

<div class="container">
  <!-- 音色选择器 -->
  <div class="voice-section">
    <span class="voice-label">🎤 语音音色</span>
    <select id="voiceSelect" class="voice-select">
      <option value="">选择音色</option>
    </select>
    <span class="voice-info" id="voiceInfo">选择后全局生效</span>
  </div>

  <div class="section-title">🎭 内置形象</div>
  <div class="model-grid" id="modelGrid"></div>

  <div class="upload-section">
    <div class="section-title">📤 上传自定义 Live2D 形象</div>
    <div class="upload-zone" id="uploadZone">
      <div class="upload-icon">📁</div>
      <p>拖拽 Live2D 模型文件夹（ZIP格式）到此处，或点击选择文件</p>
      <p style="font-size:.75rem;color:#666;margin-top:5px">支持 .zip 格式（包含 .model.json 文件）</p>
      <div class="upload-progress" id="uploadProgress"></div>
    </div>
    <input type="file" id="fileInput" accept=".zip" multiple style="display:none">
  </div>
</div>

<!-- 预览弹窗 -->
<div class="preview-overlay" id="previewOverlay">
  <div class="preview-box">
    <button class="preview-close" onclick="closePreview()">&times;</button>
    <div class="preview-canvas" id="previewCanvas"></div>
    <div class="preview-info">
      <h3 id="previewName"></h3>
      <div style="margin-top:10px;display:flex;gap:8px;justify-content:center">
        <button class="btn btn-primary" id="previewSelectBtn">使用此形象</button>
        <button class="btn btn-secondary" onclick="closePreview()">关闭</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var modelsConfig=[];
var previewApp=null;
var previewModel=null;
var thumbnailApps=[]; // 存储所有缩略图的 PIXI applications
var voicesList=[]; // 存储音色列表

function showToast(msg, type='info'){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show '+type;
  setTimeout(function(){t.classList.remove('show')},3000);
}

// 加载音色列表
async function loadVoices(){
  try{
    var res=await fetch('/api/config/voices');
    
    if(!res.ok){
      return;
    }
    
    var data=await res.json();
    voicesList=data.voices||[];
    
    var select=document.getElementById('voiceSelect');
    if(!select){
      return;
    }
    
    select.innerHTML='<option value="">选择音色</option>';
    
    // 获取保存的音色（优先使用 localStorage）
    var savedVoice=localStorage.getItem('selectedVoice');
    
    voicesList.forEach(function(v){
      var opt=document.createElement('option');
      opt.value=v.id;
      opt.textContent=v.name+' ('+v.style+')';
      // 优先使用 localStorage 的值，其次使用 API 返回的当前音色
      if(savedVoice===v.id || (!savedVoice && v.id===data.current_voice)){
        opt.selected=true;
        document.getElementById('voiceInfo').textContent=v.name+' - '+v.style;
      }
      select.appendChild(opt);
    });
    
    select.onchange=function(){
      if(this.value){
        changeVoice(this.value);
      }
    };
  }catch(e){
    console.error('加载音色列表失败:',e);
  }
}

// 切换音色
async function changeVoice(voiceId){
  try{
    await fetch('/api/config/set-voice?voice_id='+voiceId, {method:'POST'});
    // 保存到 localStorage，确保跨页面保持一致
    localStorage.setItem('selectedVoice', voiceId);
    var voice=voicesList.find(function(v){return v.id===voiceId});
    if(voice){
      document.getElementById('voiceInfo').textContent=voice.name+' - '+voice.style;
      showToast('已切换为: '+voice.name+' ('+voice.style+')', 'success');
    }
  }catch(e){
    console.error('切换音色失败:',e);
    showToast('切换音色失败', 'error');
  }
}

// 加载模型列表
async function loadModels(){
  try{
    var res=await fetch('/static/live2d/models.json?t=' + Date.now());
    var data=await res.json();
    modelsConfig=(data.models||[]).filter(function(m){return m.type==='live2d' && m.modelUrl});
    renderModelGrid();
  }catch(e){
    showToast('加载模型列表失败', 'error');
  }
}

// 渲染模型卡片
function renderModelGrid(){
  // 销毁所有旧的缩略图应用，释放 WebGL contexts
  thumbnailApps.forEach(function(app){
    try{app.destroy(true)}catch(e){}
  });
  thumbnailApps=[];

  var grid=document.getElementById('modelGrid');
  grid.innerHTML='';
  var currentId=localStorage.getItem('selectedModelId')||'shizuku';

  modelsConfig.forEach(function(model){
    var card=document.createElement('div');
    var isCustom = model.custom === true;
    card.className='model-card'+(model.id===currentId?' active':'')+(isCustom?' custom':'');
    card.innerHTML=`
      <div class="model-preview" id="preview-${model.id}">
        <div class="loading">加载预览...</div>
      </div>
      <div class="model-info">
        <h3>${model.name}</h3>
      </div>
      <div class="model-actions">
        <button class="btn btn-primary btn-sm" onclick="selectModel('${model.id}')">选择</button>
        <button class="btn btn-secondary btn-sm" onclick="openPreview('${model.id}')">预览</button>
        ${isCustom?'<button class="btn btn-danger btn-sm" onclick="deleteCustomModel(\''+model.id+'\')">删除</button>':''}
      </div>
    `;
    grid.appendChild(card);

    // 加载缩略图预览
    loadThumbnail(model);
  });
}

// 加载缩略图
async function loadThumbnail(model){
  var container=document.getElementById('preview-'+model.id);
  if(!container)return;

  try{
    var app=new PIXI.Application({
      width:container.clientWidth||300,
      height:220,
      transparent:true,
      autoDensity:true,
      resolution:Math.min(window.devicePixelRatio||1,2)
    });
    
    // 将应用添加到数组，便于后续销毁
    thumbnailApps.push(app);
    
    container.innerHTML='';
    container.appendChild(app.view);

    var m=await PIXI.live2d.Live2DModel.from(model.modelUrl);
    app.stage.addChild(m);
    m.anchor.set(0.5,0.5);
    m.x=app.screen.width/2;
    m.y=app.screen.height/2;
    var sc=Math.min(app.screen.width/m.width,app.screen.height/m.height);
    m.scale.set(sc*0.7);
  }catch(e){
    container.innerHTML='<div style="font-size:48px">🎭</div>';
  }
}

// 选择模型
async function selectModel(id){
  var model=modelsConfig.find(function(m){return m.id===id});
  if(!model)return;

  localStorage.setItem('selectedModelId',id);
  localStorage.setItem('selectedModelUrl',model.modelUrl);

  // 同步音色
  if(model.voice){
    try{await fetch('/api/config/set-voice?voice_id='+model.voice,{method:'POST'});}catch(e){}
  }

  // 更新卡片状态
  document.querySelectorAll('.model-card').forEach(function(c){c.classList.remove('active')});
  var card=document.querySelector('#preview-'+id);
  if(card)card.closest('.model-card').classList.add('active');

  showToast('已选择: '+model.name+'，返回主页生效', 'success');
}

// 删除自定义模型
async function deleteCustomModel(id){
  if(!confirm('确定要删除这个自定义形象吗？')) return;

  try{
    var res=await fetch('/api/admin/delete-live2d/'+id,{method:'DELETE'});
    var data=await res.json();
    if(data.status==='ok'){
      showToast('删除成功', 'success');
      loadModels();
    }else{
      showToast(data.error||'删除失败', 'error');
    }
  }catch(e){
    showToast('删除失败', 'error');
  }
}

// 打开大预览
async function openPreview(id){
  var model=modelsConfig.find(function(m){return m.id===id});
  if(!model)return;

  var overlay=document.getElementById('previewOverlay');
  var canvas=document.getElementById('previewCanvas');
  var name=document.getElementById('previewName');
  var selectBtn=document.getElementById('previewSelectBtn');

  name.textContent=model.name;
  selectBtn.onclick=function(){selectModel(id);closePreview()};

  // 清理旧预览
  if(previewApp){try{previewApp.destroy(true)}catch(e){}}
  previewApp=null;previewModel=null;

  try{
    previewApp=new PIXI.Application({
      width:460,
      height:400,
      transparent:true,
      autoDensity:true,
      resolution:Math.min(window.devicePixelRatio||1,2)
    });
    canvas.innerHTML='';
    canvas.appendChild(previewApp.view);

    previewModel=await PIXI.live2d.Live2DModel.from(model.modelUrl);
    previewApp.stage.addChild(previewModel);
    previewModel.anchor.set(0.5,0.5);
    previewModel.x=previewApp.screen.width/2;
    previewModel.y=previewApp.screen.height/2;
    var sc=Math.min(previewApp.screen.width/previewModel.width,previewApp.screen.height/previewModel.height);
    previewModel.scale.set(sc*0.85);
  }catch(e){
    canvas.innerHTML='<div style="color:white;padding:40px;text-align:center">预览加载失败<br><small>'+e.message+'</small></div>';
  }

  overlay.classList.add('show');
}

function closePreview(){
  document.getElementById('previewOverlay').classList.remove('show');
  if(previewApp){try{previewApp.destroy(true)}catch(e){}}
  previewApp=null;previewModel=null;
}

// 上传功能
var uploadZone=document.getElementById('uploadZone');
var fileInput=document.getElementById('fileInput');
var uploadProgress=document.getElementById('uploadProgress');

uploadZone.onclick=function(){fileInput.click()};
uploadZone.ondragover=function(e){e.preventDefault();uploadZone.classList.add('dragover')};
uploadZone.ondragleave=function(){uploadZone.classList.remove('dragover')};
uploadZone.ondrop=function(e){e.preventDefault();uploadZone.classList.remove('dragover');handleUpload(e.dataTransfer.files)};
fileInput.onchange=function(){handleUpload(fileInput.files)};

async function handleUpload(files){
  if(files.length===0) return;

  uploadProgress.textContent='正在上传和解析模型...';

  for(var i=0;i<files.length;i++){
    var file=files[i];
    var fd=new FormData();
    fd.append('file',file);

    try{
      uploadProgress.textContent='正在上传: '+file.name+'...';
      var res=await fetch('/api/admin/upload-live2d',{method:'POST',body:fd});
      var data=await res.json();

      if(data.status==='ok'){
        showToast('上传成功: '+data.model.name, 'success');
      }else{
        showToast(data.error||'上传失败: '+file.name, 'error');
      }
    }catch(e){
      showToast('上传失败: '+file.name, 'error');
    }
  }

  uploadProgress.textContent='';
  loadModels();
}

// ESC 关闭预览
document.onkeydown=function(e){if(e.key==='Escape')closePreview()};

// 初始化
window.onload=function(){
  loadModels();
  loadVoices();
};
</script>

</body>
</html>
