<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵山胜境 · AI导游小灵</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .app {
            width: 420px; height: 700px;
            background: linear-gradient(180deg, #1a1a2e, #16213e);
            border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #f5af19, #f12711);
            color: white; padding: 20px; text-align: center;
            font-size: 20px; font-weight: bold; letter-spacing: 2px;
        }
        .header .sub { font-size: 12px; opacity: 0.85; margin-top: 4px; }
        .messages {
            flex: 1; overflow-y: auto; padding: 15px;
            display: flex; flex-direction: column; gap: 10px;
        }
        .msg {
            max-width: 85%; padding: 12px 16px; border-radius: 18px;
            line-height: 1.6; font-size: 14px; word-break: break-word;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border-bottom-right-radius: 4px;
        }
        .msg.bot {
            align-self: flex-start;
            background: #2d3436; color: #dfe6e9;
            border-bottom-left-radius: 4px;
            display: flex; gap: 8px; align-items: flex-start;
        }
        .msg.bot .avatar { font-size: 24px; flex-shrink: 0; }
        .input-area {
            display: flex; gap: 10px; padding: 15px;
            background: #1e272e; border-top: 1px solid #333;
        }
        .input-area input {
            flex: 1; padding: 12px 16px; border-radius: 25px;
            border: none; background: #2d3436; color: white;
            font-size: 14px; outline: none;
        }
        .input-area input::placeholder { color: #636e72; }
        .input-area button {
            width: 50px; height: 50px; border-radius: 50%;
            border: none; background: linear-gradient(135deg, #f5af19, #f12711);
            color: white; font-size: 20px; cursor: pointer;
            transition: transform 0.2s;
        }
        .input-area button:hover { transform: scale(1.1); }
        .input-area button:disabled { opacity: 0.5; transform: none; }
        .typing { color: #636e72; font-style: italic; padding: 8px 16px; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            🏯 灵山胜境 · AI导游
            <div class="sub">小灵随时为您讲解</div>
        </div>
        <div class="messages" id="messages">
            <div class="msg bot">
                <span class="avatar">🧘</span>
                <span>您好！我是您的专属导游小灵 🙏<br>关于灵山胜境的任何问题，尽管问我～</span>
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入问题..." onkeypress="if(event.key==='Enter')send()">
            <button onclick="send()" id="sendBtn">➤</button>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8000/api/chat/text';
        
        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = 'msg ' + (isUser ? 'user' : 'bot');
            if (!isUser) {
                div.innerHTML = '<span class="avatar">🧘</span><span>' + text + '</span>';
            } else {
                div.textContent = text;
            }
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        async function send() {
            const input = document.getElementById('userInput');
            const btn = document.getElementById('sendBtn');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage(text, true);
            input.value = '';
            btn.disabled = true;
            
            // 显示打字中
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.id = 'typing';
            typing.textContent = '小灵正在思考...';
            document.getElementById('messages').appendChild(typing);

            try {
                const res = await fetch(API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text })
                });
                const data = await res.json();
                document.getElementById('typing').remove();
                addMessage(data.answer, false);
            } catch (e) {
                document.getElementById('typing').remove();
                addMessage('网络连接失败，请检查后端是否启动 ⚠️', false);
            }
            btn.disabled = false;
            input.focus();
        }
    </script>
</body>
</html>
